services:
  - type: web
    name: sg-hospitaliere
    env: python
    plan: free
    region: oregon
    rootDir: toto
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
      python manage.py ensure_users || true
    startCommand: gunicorn toto.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sg-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: toto.settings

databases:
  - name: sg-db
    databaseName: sghl
    user: sghl
    plan: free
