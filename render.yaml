services:
  - type: web
    name: sg-hospitaliere
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn toto.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sg-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: toto.settings

    plan: free

databases:
  - name: sg-db
    plan: free

