services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sghl
      POSTGRES_USER: sghl
      POSTGRES_PASSWORD: sghl_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sghl"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             gunicorn toto.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: change-me-in-production-docker
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: sghl
      DB_USER: sghl
      DB_PASSWORD: sghl_secret
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
