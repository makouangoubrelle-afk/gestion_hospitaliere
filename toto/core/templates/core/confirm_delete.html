{% extends 'core/base.html' %}
{% load i18n %}

{% block content %}
<div class="page-card confirm-page-narrow">
    <div class="page-header">
        <div>
            <span class="hero-kicker">{% trans "Attention" %}</span>
            <h1>{% trans "Confirmer la suppression" %}</h1>
            <p>{% trans "Cette action est irréversible." %}</p>
        </div>
    </div>

    <div class="empty-state empty-state-danger">
        {% trans "Voulez-vous vraiment supprimer" %} <strong>{{ object_label }}</strong> ?
    </div>

    <form method="post" class="form-actions">
        {% csrf_token %}
        <button type="submit" class="submit-button btn-danger">{% trans "Oui, supprimer" %}</button>
        <a href="javascript:history.back()" class="button-link btn-secondary">{% trans "Annuler" %}</a>
    </form>
</div>
{% endblock %}
