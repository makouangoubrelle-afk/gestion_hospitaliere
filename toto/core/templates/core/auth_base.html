<!DOCTYPE html>
{% load i18n %}
<html lang="{{ LANGUAGE_CODE|default:'fr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Connexion — SGHL" %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 20px;
            --radius-sm: 12px;
            font-family: 'Outfit', system-ui, sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(37, 99, 235, 0.15), transparent),
                linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text);
        }
        .auth-shell {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }
        .auth-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .auth-brand-logo {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
        }
        .auth-brand-logo svg {
            width: 26px;
            height: 26px;
            stroke: white;
            fill: none;
            stroke-width: 2.5;
        }
        .auth-brand h1 { margin: 0; font-size: 1.5rem; font-weight: 800; }
        .auth-brand p { margin: 0.15rem 0 0; font-size: 0.85rem; color: var(--text-muted); }
        .auth-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.15);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #2563eb, #06b6d4, #7c3aed);
        }
        .auth-footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        a { color: var(--primary); font-weight: 500; text-decoration: none; }
        a:hover { color: var(--primary-dark); }
        .form-label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.88rem; }
        .form-group { margin-bottom: 1.1rem; }
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-family: inherit;
            font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12); }
        .submit-button {
            width: 100%;
            padding: 0.95rem;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
        }
        .submit-button:hover { transform: translateY(-1px); }
        .password-field { position: relative; }
        .password-field input { padding-right: 3rem; }
        .password-toggle-btn {
            position: absolute;
            right: 0.65rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0.35rem;
        }
        .password-toggle-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .demo-credentials {
            margin-top: 1.25rem;
            padding: 0.9rem 1rem;
            border-radius: var(--radius-sm);
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            font-size: 0.88rem;
            color: #1e40af;
        }
        .demo-credentials code { background: white; padding: 0.15rem 0.4rem; border-radius: 6px; font-weight: 600; }
        .empty-state {
            margin-top: 1rem;
            padding: 0.9rem;
            border-radius: var(--radius-sm);
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            font-size: 0.9rem;
        }
        .auth-lang { margin-bottom: 1rem; }
        .auth-lang .lang-switcher {
            background: white;
            border: 1px solid var(--border);
            padding: 0.25rem 0.4rem;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .auth-lang .lang-btn {
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.35rem 0.55rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        .auth-lang .lang-btn.active {
            background: var(--primary-light);
            color: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-brand">
            <div class="auth-brand-logo" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 4v16M4 12h16"/></svg>
            </div>
            <div>
                <h1>SGHL</h1>
                <p>{% trans "Système de Gestion Hospitalière" %}</p>
            </div>
        </div>
        <div class="auth-lang">{% include 'core/partials/language_switcher.html' %}</div>
        <div class="auth-card">
            {% block auth_content %}{% endblock %}
        </div>
    </div>
    <div class="auth-footer">© 2026 SGHL</div>
    <script>
        function initPasswordToggles() {
            document.querySelectorAll('[data-password-toggle]').forEach(function (wrapper) {
                var input = wrapper.querySelector('input');
                var btn = wrapper.querySelector('.password-toggle-btn');
                if (!input || !btn || btn.dataset.bound) return;
                btn.dataset.bound = '1';
                var eyeOpen = btn.querySelector('.icon-eye-open');
                var eyeClosed = btn.querySelector('.icon-eye-closed');
                btn.addEventListener('click', function () {
                    var show = input.type === 'password';
                    input.type = show ? 'text' : 'password';
                    if (eyeOpen && eyeClosed) {
                        eyeOpen.style.display = show ? 'none' : 'block';
                        eyeClosed.style.display = show ? 'block' : 'none';
                    }
                });
            });
        }
        document.addEventListener('DOMContentLoaded', initPasswordToggles);
    </script>
</body>
</html>
