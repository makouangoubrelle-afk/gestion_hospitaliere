{% extends 'core/auth_base.html' %}
{% load i18n %}

{% block auth_content %}
<h2 class="auth-title">{% trans "Inscription" %}</h2>
<p class="auth-subtitle">{% trans "Créez votre compte SGHL" %}</p>

<form method="post" action="{% url 'register' %}">
    {% csrf_token %}
    <div class="form-group">
        <label class="form-label" for="id_username">{% trans "Nom d'utilisateur" %}</label>
        {{ form.username }}
    </div>
    <div class="form-group">
        <label class="form-label" for="id_password1">{% trans "Mot de passe" %}</label>
        <div class="password-field" data-password-toggle>
            {{ form.password1 }}
            <button type="button" class="password-toggle-btn" aria-label="{% trans 'Afficher le mot de passe' %}">
                <svg class="icon-eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="icon-eye-closed" viewBox="0 0 24 24" style="display:none"><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
        </div>
    </div>
    <div class="form-group">
        <label class="form-label" for="id_password2">{% trans "Confirmation du mot de passe" %}</label>
        <div class="password-field" data-password-toggle>
            {{ form.password2 }}
            <button type="button" class="password-toggle-btn" aria-label="{% trans 'Afficher le mot de passe' %}">
                <svg class="icon-eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="icon-eye-closed" viewBox="0 0 24 24" style="display:none"><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
        </div>
    </div>
    <button type="submit" class="submit-button">{% trans "Créer un compte" %}</button>
</form>

<p class="auth-link-text">
    {% trans "Déjà inscrit ?" %} <a href="{% url 'login' %}">{% trans "Se connecter" %}</a>
</p>
{% endblock %}
